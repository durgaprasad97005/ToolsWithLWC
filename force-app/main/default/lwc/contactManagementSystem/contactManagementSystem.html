<template>
    <lightning-card icon-name="standard:contact" title="Contact Management System">
        <!-- Section 1 -->
        <div class="slds-var-p-horizontal_medium">
            <div class="slds-grid slds-var-m-vertical_small slds-grid_align-spread slds-grid_vertical-align-end">
                <!-- Search input box -->
                <lightning-input
                    class="slds-col slds-size_8-of-12"
                    type="search"
                    placeholder="Search contacts..."
                    value={searchKey}
                    onchange={handleSearchKey}
                ></lightning-input>

                <!-- Add Contact Action -->
                <lightning-button 
                    variant="brand" 
                    label="Add Contact" 
                    title="Action to add new Contact" 
                    icon-name="utility:add" 
                    class="slds-m-left_x-small"
                    onclick={handleButtonClick}
                ></lightning-button>
            </div>

            <p class="slds-border_bottom slds-text-color_weak slds-var-p-left_medium">{showContactCount} contacts</p>
        </div>

        <!-- Section 2 -->
        <div class="slds-var-p-horizontal_medium">
            <!-- Contacts -->
            <div class="slds-grid slds-wrap slds-gutters_x-small">
                <template lwc:if={contactList}>
                    <template for:each={contactList} for:item="contact">
                        <div key={contact.Id} class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-var-m-top_small">
                            <c-contact-card
                                contact-id={contact?.Id}
                                contact-name={contact?.Name?.value}
                                account-id={contact?.Account?.Id}
                                account-name={contact?.Account?.Name?.value}
                                title={contact?.Title?.value}
                                phone={contact?.Phone?.value}
                                email={contact?.Email?.value}
                            ></c-contact-card>
                        </div>
                    </template>
                </template>
            </div>
            
            <!-- Errors -->
            <template lwc:if={errors}>
                <template for:each={errors} for:item="error">
                    <div key={error}>{error}</div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
